<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <div class="masthead__menu-wrap">
        <nav id="site-nav" class="greedy-nav">
          <button><div class="navicon"></div></button>
          <ul class="visible-links">
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">{{ site.title }}</a></li>
            {% for link in site.data.navigation.main %}
              <li class="masthead__menu-item">
                <a href="{{ link.url | relative_url }}">
                  <span class="lang-zh">{{ link.title_zh }}</span>
                  <span class="lang-en">{{ link.title_en }}</span>
                </a>
              </li>
            {% endfor %}
          </ul>
          <ul class="hidden-links hidden"></ul>
        </nav>
        <div class="masthead__lang-switcher" aria-label="Language switcher">
          <button type="button" class="lang-toggle" data-set-lang="zh">中</button>
          <button type="button" class="lang-toggle" data-set-lang="en">EN</button>
        </div>
      </div>
    </div>
  </div>
</div>
